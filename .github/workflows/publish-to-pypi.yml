# Publishes the pure-Python wheel and source distribution to PyPI.
#
# One-time PyPI setup:
#   Project: pythonscad-stl-generator
#   Publisher owner/repository: nomike/pythonscad-stl-generator
#   Workflow name: publish-to-pypi.yml
#   Environment name: pypi
name: Publish to PyPI

on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip

      - name: Install build frontend
        run: python -m pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: pypi-dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
